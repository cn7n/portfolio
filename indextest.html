<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Launching Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #f4f6ff;
      --paper: #0a0f1f;
      --accent: #e6b980;
      --accent-2: #8bb2ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--ink);
      background: var(--paper);
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .sky {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(86, 132, 255, 0.35), transparent 45%),
        radial-gradient(circle at 80% 10%, rgba(40, 60, 120, 0.45), transparent 55%),
        radial-gradient(circle at 60% 80%, rgba(10, 15, 31, 0.95), transparent 60%),
        linear-gradient(180deg, #0b1128 0%, #0a0f1f 55%, #070a12 100%);
      animation: drift 24s ease-in-out infinite;
      z-index: -3;
    }

    @keyframes drift {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      50% {
        transform: translate3d(-2%, -1%, 0) scale(1.03);
      }
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: -2;
    }

    .mountains {
      position: fixed;
      inset: auto 0 0 0;
      height: 45vh;
      background:
        linear-gradient(180deg, rgba(7, 10, 18, 0) 0%, rgba(7, 10, 18, 0.95) 70%),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 400' preserveAspectRatio='none'><path d='M0,300 L140,220 L260,280 L380,160 L520,260 L680,140 L820,220 L960,120 L1100,200 L1200,140 L1200,400 L0,400 Z' fill='%23080c16'/><path d='M0,330 L180,260 L320,320 L460,210 L620,300 L760,200 L920,280 L1080,190 L1200,250 L1200,400 L0,400 Z' fill='%23060a12'/></svg>");
      background-size: cover;
      background-position: center bottom;
      opacity: 0.95;
      z-index: -1;
    }

    .mist {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.06), transparent 45%);
      opacity: 0.6;
      animation: mist 20s ease-in-out infinite;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes mist {
      0% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(2%, -1%, 0);
      }
      100% {
        transform: translate3d(0, 0, 0);
      }
    }

    .card {
      background: rgba(9, 14, 30, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      backdrop-filter: blur(14px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
      max-width: 560px;
      width: min(90%, 560px);
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 12px;
      color: var(--accent-2);
      margin-bottom: 12px;
    }

    h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(36px, 6vw, 54px);
      margin-bottom: 14px;
    }

    p {
      font-size: 16px;
      color: rgba(244, 246, 255, 0.75);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(230, 185, 128, 0.16);
      color: var(--accent);
      font-weight: 600;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(230, 185, 128, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.9);
        opacity: 0.7;
      }
      50% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(0.9);
        opacity: 0.7;
      }
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(244, 246, 255, 0.6);
    }
  </style>
</head>
<body>
  <div class="sky" aria-hidden="true"></div>
  <canvas id="stars" aria-hidden="true"></canvas>
  <div class="mist" aria-hidden="true"></div>
  <div class="mountains" aria-hidden="true"></div>

  <main class="card">
    <div class="eyebrow">Portfolio Update</div>
    <h1>Launching Soon</h1>
    <p>
      My portfolio is being polished and will be live shortly. Thanks for stopping by.
    </p>
    <div class="status">
      <span class="dot"></span>
      New site in progress
    </div>
    <div class="note">Check back soon for the full experience.</div>
  </main>

  <script>
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    const stars = [];
    const starCount = 140;

    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };

    const initStars = () => {
      stars.length = 0;
      for (let i = 0; i < starCount; i += 1) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 1.6 + 0.4,
          alpha: Math.random() * 0.7 + 0.2,
          drift: Math.random() * 0.3 + 0.05
        });
      }
    };

    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      stars.forEach((star) => {
        ctx.globalAlpha = star.alpha;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
        star.x += star.drift * 0.3;
        star.y += star.drift * 0.1;
        if (star.x > canvas.width + 10) star.x = -10;
        if (star.y > canvas.height + 10) star.y = -10;
      });
      requestAnimationFrame(draw);
    };

    window.addEventListener("resize", () => {
      resize();
      initStars();
    });

    resize();
    initStars();
    draw();
  </script>
</body>
</html>
